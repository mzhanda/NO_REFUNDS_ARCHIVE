<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NO REFUNDS ARCHIVE - v2 Gallery Review</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #111; color: #ddd; padding: 20px; }
header { margin-bottom: 24px; }
h1 { font-size: 22px; color: #d4a853; margin-bottom: 6px; }
.subtitle { color: #888; font-size: 13px; }

.controls { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 20px; padding: 14px 16px; background: #1a1a1a; border-radius: 10px; }
.controls label { font-size: 13px; color: #aaa; margin-right: 4px; }
.controls select, .controls input, .controls button { padding: 7px 10px; border-radius: 6px; border: 1px solid #444; background: #2a2a2a; color: #eee; font-size: 13px; }
.controls button { cursor: pointer; background: #d4a853; color: #111; border: none; font-weight: 600; }
.controls button:hover { background: #e0b860; }
.stats { font-size: 12px; color: #888; margin-left: auto; }

#gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
.card { background: #1a1a1a; border-radius: 12px; overflow: hidden; border: 2px solid transparent; transition: border-color 0.2s; }
.card:hover { border-color: #444; }
.card.selected { border-color: #d4a853; }
.card.marked-keep { border-color: #4caf50; }
.card.marked-redo { border-color: #f44336; }
.card.marked-delete { border-color: #ff5722; opacity: 0.6; }
.card.marked-legendary { border-color: #ff9800; }

.card-img { width: 100%; aspect-ratio: 1; background: #222; display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: pointer; }
.card-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.2s; }
.card-img:hover img { transform: scale(1.05); }

.card-info { padding: 10px 12px; font-size: 12px; }
.card-info .nft-id { color: #d4a853; font-weight: 700; font-size: 13px; margin-bottom: 4px; }
.card-info .meta-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 3px; }
.card-info .tag { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px; }
.tag-series { background: #333; color: #ccc; }
.tag-rarity { background: #333; color: #ccc; }
.tag-Common { background: #555; }
.tag-Uncommon { background: #2e7d32; }
.tag-Rare { background: #1565c0; }
.tag-Legendary { background: #f57c00; }
.tag-Ultra { background: #6a1b9a; }
.tag-mat { background: #1b5e20; color: #a5d6a7; }
.tag-legend { background: #e65100; color: #ffe0b2; }
.card-info .file-name { color: #666; font-size: 10px; word-break: break-all; margin-top: 4px; }

.card-actions { display: flex; gap: 4px; padding: 0 12px 10px; flex-wrap: wrap; }
.card-actions button { flex: 1; min-width: 44px; padding: 5px 8px; border-radius: 4px; border: 1px solid #444; background: #2a2a2a; color: #ccc; cursor: pointer; font-size: 11px; transition: all 0.15s; }
.card-actions button:hover { background: #3a3a3a; }
.card-actions .btn-keep { border-color: #4caf50; color: #4caf50; }
.card-actions .btn-keep.active { background: #4caf50; color: #fff; }
.card-actions .btn-redo { border-color: #f44336; color: #f44336; }
.card-actions .btn-redo.active { background: #f44336; color: #fff; }
.card-actions .btn-delete { border-color: #ff5722; color: #ff5722; }
.card-actions .btn-delete.active { background: #ff5722; color: #fff; }
.card-actions .btn-legendary { border-color: #ff9800; color: #ff9800; }
.card-actions .btn-legendary.active { background: #ff9800; color: #fff; }

.export-bar { margin-top: 20px; padding: 14px 16px; background: #1a1a1a; border-radius: 10px; display: flex; gap: 12px; align-items: center; }
.export-bar button { padding: 8px 20px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; font-size: 13px; }
.btn-export { background: #d4a853; color: #111; }
.btn-reset { background: #444; color: #ccc; }
.export-bar .summary { font-size: 12px; color: #888; margin-left: 12px; }

.lightbox { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 1000; }
.lightbox.active { display: flex; }
.lightbox img { max-width: 90vw; max-height: 85vh; object-fit: contain; }
.lightbox-close { position: absolute; top: 20px; right: 30px; font-size: 36px; color: #fff; cursor: pointer; background: none; border: none; }

.empty { color: #666; text-align: center; padding: 60px; grid-column: 1 / -1; }
</style>
</head>
<body>

<header>
  <h1>NO REFUNDS ARCHIVE — v2 图片审核 Gallery</h1>
  <div class="subtitle">Batch 0100 v2 · 100 images · 标记保留/重做/删除/传奇候选 · 导出决策CSV</div>
</header>

<div class="controls">
  <label>系列:</label>
  <select id="filterSeries">
    <option value="">全部</option>
  </select>
  <label>稀有度:</label>
  <select id="filterRarity">
    <option value="">全部</option>
  </select>
  <label>标记:</label>
  <select id="filterMark">
    <option value="">全部</option>
    <option value="keep">保留</option>
    <option value="redo">重做</option>
    <option value="delete">删除</option>
    <option value="legendary">传奇候选</option>
  </select>
  <button id="btnClear">清除筛选</button>
  <div class="stats" id="stats">共 0 张</div>
</div>

<div id="gallery"></div>

<div class="export-bar">
  <button class="btn-export" id="btnExport">📥 导出 review_decisions.csv</button>
  <button class="btn-reset" id="btnReset">重置所有标记</button>
  <span class="summary" id="exportSummary"></span>
</div>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose">&times;</button>
  <img id="lightboxImg" src="" alt="">
</div>

<script>
const IMG_BASE = 'output/final_images_v2/';
const META_BASE = 'output/metadata_v2/';

let allCards = [];
let decisions = {}; // { filename: 'keep'|'redo'|'delete'|'legendary' }

// 加载 CSV 数据
fetch('data/v2_image_selection_review.csv?' + Date.now())
  .then(r => r.text())
  .then(csv => {
    const rows = csv.split('\n').filter(l => l.trim());
    const headers = rows[0].split(',');
    for (let i = 1; i < rows.length; i++) {
      const cols = rows[i].split(',');
      if (cols.length < 5) continue;
      const card = {};
      headers.forEach((h, j) => card[h.trim()] = (cols[j] || '').trim());
      allCards.push(card);
    }
    initFilters();
    render();
  });

function initFilters() {
  const seriesSet = new Set(allCards.map(c => c['系列']).filter(Boolean));
  const seriesSel = document.getElementById('filterSeries');
  [...seriesSet].sort().forEach(s => {
    const opt = document.createElement('option');
    opt.value = s; opt.textContent = s;
    seriesSel.appendChild(opt);
  });
}

function getFiltered() {
  const s = document.getElementById('filterSeries').value;
  const r = document.getElementById('filterRarity').value;
  const m = document.getElementById('filterMark').value;
  return allCards.filter(c => {
    if (s && c['系列'] !== s) return false;
    if (r && c['稀有度'] !== r) return false;
    if (m) {
      const fn = c['图片文件名'];
      const d = decisions[fn] || '';
      if (m === 'keep' && d !== 'keep') return false;
      if (m === 'redo' && d !== 'redo') return false;
      if (m === 'delete' && d !== 'delete') return false;
      if (m === 'legendary' && d !== 'legendary') return false;
      if (!d) return false;
    }
    return true;
  });
}

function render() {
  const filtered = getFiltered();
  const gallery = document.getElementById('gallery');
  gallery.innerHTML = '';

  if (filtered.length === 0) {
    gallery.innerHTML = '<div class="empty">无匹配结果</div>';
    document.getElementById('stats').textContent = '共 0 张';
    return;
  }

  document.getElementById('stats').textContent = `显示 ${filtered.length} / ${allCards.length} 张`;

  filtered.forEach(card => {
    const fn = card['图片文件名'];
    const mark = decisions[fn] || '';
    const markClass = mark === 'keep' ? 'marked-keep' : mark === 'redo' ? 'marked-redo' : mark === 'delete' ? 'marked-delete' : mark === 'legendary' ? 'marked-legendary' : '';

    const div = document.createElement('div');
    div.className = 'card ' + markClass;
    div.innerHTML = `
      <div class="card-img">
        <img src="${IMG_BASE}${fn}" alt="${card['编号']}" loading="lazy" onclick="openLightbox('${IMG_BASE}${fn}')">
      </div>
      <div class="card-info">
        <div class="nft-id">${card['编号']}</div>
        <div class="meta-row">
          <span class="tag tag-series">${card['系列'] || '?'}</span>
          <span class="tag tag-rarity tag-${(card['稀有度']||'').replace(/\s+/g,'')}">${card['稀有度'] || '?'}</span>
          ${card['material_pattern'] ? `<span class="tag tag-mat">${card['material_pattern']}</span>` : ''}
          ${card['legendary_accent'] ? `<span class="tag tag-legend">${card['legendary_accent']}</span>` : ''}
        </div>
        <div class="meta-row" style="font-size:10px; color:#777;">
          ${card['是否有对应metadata'] === '是' ? '✅meta' : '❌meta'}
          ${card['是否通过规则校验'] === '是' ? ' ✅校验' : ' ❌校验'}
          ${mark ? ' 🔖' + ({keep:'保留',redo:'重做',delete:'删除',legendary:'传奇'})[mark] : ''}
        </div>
        <div class="file-name">${fn}</div>
      </div>
      <div class="card-actions">
        <button class="btn-keep ${mark==='keep'?'active':''}" onclick="markCard('${fn}','keep')">保留</button>
        <button class="btn-redo ${mark==='redo'?'active':''}" onclick="markCard('${fn}','redo')">重做</button>
        <button class="btn-delete ${mark==='delete'?'active':''}" onclick="markCard('${fn}','delete')">删除</button>
        <button class="btn-legendary ${mark==='legendary'?'active':''}" onclick="markCard('${fn}','legendary')">传奇</button>
      </div>
    `;
    gallery.appendChild(div);
  });

  updateSummary();
}

function markCard(filename, mark) {
  if (decisions[filename] === mark) {
    delete decisions[filename];
  } else {
    decisions[filename] = mark;
  }
  render();
}

function updateSummary() {
  const counts = { keep: 0, redo: 0, delete: 0, legendary: 0 };
  Object.values(decisions).forEach(m => counts[m] = (counts[m] || 0) + 1);
  document.getElementById('exportSummary').textContent = 
    `保留:${counts.keep} 重做:${counts.redo} 删除:${counts.delete} 传奇:${counts.legendary} | 已标记:${Object.keys(decisions).length}`;
}

// 导出
document.getElementById('btnExport').addEventListener('click', () => {
  const rows = ['编号,图片文件名,标记,系列,稀有度,备注'];
  allCards.forEach(c => {
    const mark = decisions[c['图片文件名']] || '';
    rows.push(`${c['编号']},${c['图片文件名']},${mark},${c['系列']},${c['稀有度']},`);
  });
  const blob = new Blob(['\uFEFF' + rows.join('\n')], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'review_decisions.csv'; a.click();
  URL.revokeObjectURL(url);
});

// 重置
document.getElementById('btnReset').addEventListener('click', () => {
  if (confirm('确定要清除所有标记？')) { decisions = {}; render(); }
});

// 筛选
['filterSeries','filterRarity','filterMark'].forEach(id => {
  document.getElementById(id).addEventListener('change', render);
});
document.getElementById('btnClear').addEventListener('click', () => {
  document.getElementById('filterSeries').value = '';
  document.getElementById('filterRarity').value = '';
  document.getElementById('filterMark').value = '';
  render();
});

// Lightbox
function openLightbox(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('active');
}
document.getElementById('lightboxClose').addEventListener('click', () => {
  document.getElementById('lightbox').classList.remove('active');
});
document.getElementById('lightbox').addEventListener('click', (e) => {
  if (e.target === document.getElementById('lightbox')) {
    document.getElementById('lightbox').classList.remove('active');
  }
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') document.getElementById('lightbox').classList.remove('active');
});
</script>
</body>
</html>
