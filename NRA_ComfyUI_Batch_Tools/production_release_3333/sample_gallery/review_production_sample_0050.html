  for (let i = 0; i < text.length; i++) {

function loadReviewCsv(csv) {
    const parsed = parseCSV(csv);
    const headers = parsed.shift().map(h => h.trim());
    allCards = parsed.map(cols => {
      const card = {};
      headers.forEach((h, j) => card[h] = (cols[j] || '').trim());
      return card;
    }).filter(card => card['图片文件名']);
    pruneMissingDecisions();
    initFilters();
    render();
    renderConfirmed(false);
}
loadReviewCsv(REVIEW_CSV);
function pruneMissingDecisions() {
  const known = new Set(allCards.map(c => c['图片文件名']));
  Object.keys(decisions).forEach(fn => { if (!known.has(fn)) delete decisions[fn]; });
  saveStoredDecisions();
}
function initFilters() {
  fillSelect('filterSeries', [...new Set(allCards.map(c => c['系列']).filter(Boolean))].sort());
  fillSelect('filterRarity', [...new Set(allCards.map(c => c['稀有度']).filter(Boolean))].sort((a, b) => rarityRank(a) - rarityRank(b)));
  fillSelect('filterTrait', [...new Set(allCards.map(c => c['Special Feature']).filter(Boolean))].sort());
}
function rarityRank(rarity) {
  return { Common: 1, Uncommon: 2, Rare: 3, Legendary: 4, 'Ultra Rare': 5 }[rarity] || 99;
}
function fillSelect(id, values) {
  const select = document.getElementById(id);
  const current = select.value;
  select.innerHTML = '<option value="">全部</option>';
  values.forEach(value => {
    const opt = document.createElement('option');
    opt.value = value;
    opt.textContent = value;
    select.appendChild(opt);
  });
  if ([...select.options].some(o => o.value === current)) select.value = current;
}
function getFiltered() {
  const series = document.getElementById('filterSeries').value;
  const rarity = document.getElementById('filterRarity').value;
  const mark = document.getElementById('filterMark').value;
  const trait = document.getElementById('filterTrait').value;
  return allCards.filter(card => {
    const fn = card['图片文件名'];
    const decision = decisions[fn] || '';
    if (series && card['系列'] !== series) return false;
    if (rarity && card['稀有度'] !== rarity) return false;
    if (trait && card['Special Feature'] !== trait) return false;
    if (mark === 'unmarked') return !decision;
    if (mark && decision !== mark) return false;
    return true;
  });
}
function render() {
  const filtered = getFiltered();
  const gallery = document.getElementById('gallery');
  gallery.innerHTML = '';
  document.getElementById('stats').textContent = `显示 ${filtered.length} / ${allCards.length} 张`;
  if (!filtered.length) {
    gallery.innerHTML = '<div class="empty">无匹配结果</div>';
    updateSummary();
    return;
  }
  filtered.forEach(card => gallery.appendChild(createCard(card)));
  updateSummary();
}
function createCard(card) {
  const fn = card['图片文件名'];
  const mark = decisions[fn] || '';
  const div = document.createElement('div');
  div.className = 'card ' + (mark ? `marked-${mark}` : '');
  div.innerHTML = `
    <div class="card-img">
      <img src="${IMG_BASE}${fn}" alt="${card['编号']}" loading="lazy" onclick="openLightboxByFilename('${fn}')">
    </div>
    <div class="card-info">
      <div class="nft-id">${card['编号']}</div>
      <div class="meta-row">
        <span class="tag tag-series">${card['系列'] || '?'}</span>
        <span class="tag tag-rarity tag-${classSafe(card['稀有度'])}">${card['稀有度'] || '?'}</span>
        ${card['material_pattern'] ? `<span class="tag tag-mat">${card['material_pattern']}</span>` : ''}
        ${card['Special Feature'] ? `<span class="tag tag-legend">${card['Special Feature']}</span>` : ''}<div class="file-name">${card['combination_fingerprint'] || ''}</div>
      </div>
      <div class="meta-row" style="font-size:10px; color:#777;">
        ${card['metadata是否生成'] === '是' || card['是否有对应metadata'] === '是' ? 'meta OK' : 'meta ?'}
        ${card['是否通过规则校验'] === '是' ? ' · rule OK' : ' · rule ?'}
        ${mark ? ` · 已标记 ${MARK_LABELS[mark]}` : ''}
      </div>
      <div class="file-name">${fn}<br>${card['combination_fingerprint'] || ''}</div>
    </div>
    <div class="card-actions">
      ${actionButton(fn, mark, 'keep')}
      ${actionButton(fn, mark, 'redo')}
      ${actionButton(fn, mark, 'delete')}
      ${actionButton(fn, mark, 'legendary')}
    </div>`;
  return div;
}
function actionButton(filename, current, mark) {
  return `<button class="btn-${mark} ${current === mark ? 'active' : ''}" onclick="markCard('${filename}','${mark}')">${MARK_LABELS[mark]}</button>`;
}
function classSafe(value) {
  return String(value || '').replace(/\s+/g, '');
}
function markCard(filename, mark) {
  if (decisions[filename] === mark) delete decisions[filename];
  else decisions[filename] = mark;
  saveStoredDecisions();
  localStorage.removeItem(CONFIRMED_KEY);
  document.getElementById('confirmStatus').textContent = '有新的标记改动，还没有重新确认。';
  render();
  renderConfirmed(false);
  updateLightboxActions(filename);
}
function countMarks() {
  const counts = { keep: 0, redo: 0, delete: 0, legendary: 0 };
  Object.values(decisions).forEach(mark => { counts[mark] = (counts[mark] || 0) + 1; });
  return counts;
}
function updateSummary() {
  const counts = countMarks();
  const total = Object.keys(decisions).length;
  document.getElementById('exportSummary').textContent = `保留:${counts.keep} 重做:${counts.redo} 删除:${counts.delete} 传奇候选:${counts.legendary} | 已标记:${total}/${allCards.length}`;
}
function buildDecisionRows() {
  const rows = [['编号', '图片文件名', '标记', '标记中文', '系列', '稀有度', '备注']];
  allCards.forEach(card => {
    const mark = decisions[card['图片文件名']] || '';
    rows.push([card['编号'], card['图片文件名'], mark, MARK_LABELS[mark] || '', card['系列'], card['稀有度'], '']);
  });
  return rows;
}
function downloadCSV() {
  const csv = buildDecisionRows().map(row => row.map(csvEscape).join(',')).join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'review_decisions_0050.csv';
  a.click();
  URL.revokeObjectURL(url);
}
function confirmReview() {
  saveStoredDecisions();
  const markedImages = getMarkedCards().map(card => ({
    id: card['编号'],
    filename: card['图片文件名'],
    mark: decisions[card['图片文件名']],
    markLabel: MARK_LABELS[decisions[card['图片文件名']]],
    series: card['系列'],
    rarity: card['稀有度']
  }));
  localStorage.setItem(CONFIRMED_KEY, JSON.stringify({
    confirmedAt: new Date().toISOString(),
    decisions,
    counts: countMarks(),
    markedImages
  }));
  renderConfirmed(true);
  downloadCSV();
  document.getElementById('confirmStatus').textContent = `已确认 ${markedImages.length} 张标记图片，并已下载 review_decisions_0050.csv。`;
}
function getMarkedCards() {
  return allCards
    .filter(card => decisions[card['图片文件名']])
    .sort((a, b) => MARK_ORDER[decisions[a['图片文件名']]] - MARK_ORDER[decisions[b['图片文件名']]] || a['编号'].localeCompare(b['编号']));
}
function renderConfirmed(forceOpen) {
  const panel = document.getElementById('confirmPanel');
  const grid = document.getElementById('confirmGrid');
  const hint = document.getElementById('confirmHint');
  const marked = getMarkedCards();
  if (!marked.length) {
    grid.innerHTML = '<div class="empty">还没有标记图片。</div>';
    hint.textContent = '确认后这里会展示所有已标记图片。';
    if (forceOpen) panel.classList.add('active');
    return;
  }
  const confirmed = localStorage.getItem(CONFIRMED_KEY);
  if (forceOpen || confirmed) panel.classList.add('active');
  hint.textContent = `共 ${marked.length} 张已标记；我接手时可以按这些文件名读取你的决定。`;
  grid.innerHTML = '';
  marked.forEach(card => {
    const fn = card['图片文件名'];
    const mark = decisions[fn];
    const item = document.createElement('div');
    item.className = 'confirm-card';
    item.innerHTML = `
      <img src="${IMG_BASE}${fn}" alt="${card['编号']}" loading="lazy" onclick="openLightboxByFilename('${fn}')">
      <div class="confirm-info">
        <div class="confirm-id">${card['编号']}</div>
        <div><span class="confirm-mark ${mark}">${MARK_LABELS[mark]}</span> · ${card['稀有度'] || '?'} · ${card['系列'] || '?'}</div>
        <div class="file-name">${fn}<br>${card['combination_fingerprint'] || ''}</div>
      </div>`;
    grid.appendChild(item);
  });
}
document.getElementById('btnConfirm').addEventListener('click', confirmReview);
document.getElementById('btnExport').addEventListener('click', downloadCSV);
document.getElementById('btnReset').addEventListener('click', () => {
  if (confirm('确定要清除所有标记？')) {
    decisions = {};
    saveStoredDecisions();
    localStorage.removeItem(CONFIRMED_KEY);
    document.getElementById('confirmStatus').textContent = '已清除所有标记。';
    document.getElementById('confirmPanel').classList.remove('active');
    render();
    renderConfirmed(false);
  }
});
['filterSeries', 'filterRarity', 'filterTrait', 'filterMark'].forEach(id => document.getElementById(id).addEventListener('change', render));
document.getElementById('btnClear').addEventListener('click', () => {
  document.getElementById('filterSeries').value = '';
  document.getElementById('filterRarity').value = '';
  document.getElementById('filterMark').value = '';
  document.getElementById('filterTrait').value = '';
  render();
});
function currentLightboxList() {
  const filtered = getFiltered();
  return filtered.length ? filtered : allCards;
}
function openLightboxByFilename(filename) {
  const list = currentLightboxList();
  const index = list.findIndex(card => card['图片文件名'] === filename);
  openLightboxAt(index >= 0 ? index : 0, list);
}
function openLightboxAt(index, list = currentLightboxList()) {
  if (!list.length) return;
  currentLightboxIndex = Math.max(0, Math.min(index, list.length - 1));
  const card = list[currentLightboxIndex];
  currentLightboxFilename = card['图片文件名'];
  const src = IMG_BASE + currentLightboxFilename;
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightboxCaption').textContent = `${card['编号']} · ${card['稀有度'] || '?'} · ${card['系列'] || '?'} · ${currentLightboxIndex + 1}/${list.length}`;
  document.getElementById('lightboxPrev').disabled = currentLightboxIndex === 0;
  document.getElementById('lightboxNext').disabled = currentLightboxIndex === list.length - 1;
  updateLightboxActions(currentLightboxFilename);
  document.getElementById('lightbox').classList.add('active');
}
function stepLightbox(delta) {
  if (!document.getElementById('lightbox').classList.contains('active')) return;
  const list = currentLightboxList();
  const nextIndex = currentLightboxIndex + delta;
  if (nextIndex < 0 || nextIndex >= list.length) return;
  openLightboxAt(nextIndex, list);
}
function updateLightboxActions(filename = currentLightboxFilename) {
  const current = decisions[filename] || '';
  document.querySelectorAll('#lightboxActions button').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.mark === current);
  });
}
function markCurrentLightbox(mark) {
  if (!currentLightboxFilename) return;
  markCard(currentLightboxFilename, mark);
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
}
document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
document.getElementById('lightboxPrev').addEventListener('click', e => { e.stopPropagation(); stepLightbox(-1); });
document.getElementById('lightboxNext').addEventListener('click', e => { e.stopPropagation(); stepLightbox(1); });
document.querySelectorAll('#lightboxActions button').forEach(btn => {
  btn.addEventListener('click', e => {
    e.stopPropagation();
    markCurrentLightbox(btn.dataset.mark);
  });
});
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === document.getElementById('lightbox')) closeLightbox();
});
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('active')) return;
  if (e.key === 'ArrowLeft') stepLightbox(-1);
  if (e.key === 'ArrowRight') stepLightbox(1);
  if (e.key === 'Escape') closeLightbox();
});
</script>
</body>
</html>
