<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NO REFUNDS ARCHIVE - 拼装结果预览</title>
<style>
  :root {
    --bg: #1a1a1a;
    --card-bg: #2a2a2a;
    --text: #e0d8c8;
    --accent: #c0392b;
    --border: #3a3a3a;
    --tag-bg: #333;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier New', Courier, monospace;
    min-height: 100vh;
    padding: 2rem;
  }
  header {
    text-align: center;
    margin-bottom: 2rem;
    border-bottom: 2px solid var(--accent);
    padding-bottom: 1rem;
  }
  header h1 {
    font-size: 1.8rem;
    color: var(--accent);
    letter-spacing: 2px;
  }
  header p {
    color: #888;
    margin-top: 0.5rem;
    font-size: 0.9rem;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 1.5rem;
    max-width: 1400px;
    margin: 0 auto;
  }
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .card img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    display: block;
    border-bottom: 1px solid var(--border);
  }
  .card-body {
    padding: 1rem;
  }
  .card-body h3 {
    font-size: 0.95rem;
    color: var(--accent);
    margin-bottom: 0.5rem;
    letter-spacing: 1px;
  }
  .card-body .filename {
    font-size: 0.7rem;
    color: #666;
    margin-bottom: 0.75rem;
    word-break: break-all;
  }
  .traits {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .trait {
    background: var(--tag-bg);
    color: #c0b89a;
    padding: 2px 8px;
    border-radius: 3px;
    font-size: 0.7rem;
    border: 1px solid var(--border);
  }
  .trait.stamp {
    color: #e74c3c;
    border-color: #e74c3c33;
  }
  .trait.rarity-Common { color: #aaa; }
  .trait.rarity-Uncommon { color: #4caf50; }
  .trait.rarity-Rare { color: #2196f3; }
  .trait.rarity-Legendary { color: #ff9800; }
  .trait.rarity-Ultra { color: #e91e63; }
  .summary {
    max-width: 1400px;
    margin: 2rem auto 0;
    padding: 1rem;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    display: flex;
    gap: 2rem;
    flex-wrap: wrap;
    justify-content: center;
  }
  .summary-item {
    text-align: center;
  }
  .summary-item .num {
    font-size: 1.5rem;
    color: var(--accent);
  }
  .summary-item .label {
    font-size: 0.7rem;
    color: #888;
  }
  .checklist {
    max-width: 1400px;
    margin: 1.5rem auto 0;
    padding: 1rem;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
  }
  .checklist h3 {
    color: var(--accent);
    margin-bottom: 0.5rem;
  }
  .checklist ul {
    list-style: none;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 4px;
  }
  .checklist li {
    font-size: 0.8rem;
    padding: 4px 8px;
  }
  .checklist li.pass { color: #4caf50; }
  .checklist li.pass::before { content: "✓ "; }
</style>
</head>
<body>

<header>
  <h1>NO REFUNDS ARCHIVE</h1>
  <p>分层拼装系统 · 前10张预览 · Composer v3.0</p>
</header>

<div class="grid" id="grid"></div>

<div class="summary" id="summary"></div>

<div class="checklist">
  <h3>拼装结果摘要</h3>
  <ul id="checklist-ul">
  </ul>
</div>

<script>
// Dynamically load metadata JSONs for the first 10 NFTs
const metadataFiles = [
  "NRA_0001_TokenPawn_B05_VAR_01_UNCLAIMED.json",
  "NRA_0002_SideBRecords_B01_VAR_08_LAST_COPY.json",
  "NRA_0003_SideBRecords_B04_VAR_01_STORE_CREDIT.json",
  "NRA_0004_NightOwlVideo_B08_VAR_02_CHECKED_OUT.json",
  "NRA_0005_MidnightDiner_B02_VAR_04_CLOSED.json",
  "NRA_0006_NightOwlVideo_B02_VAR_07_NO_REFUNDS.json",
  "NRA_0007_Lucky8GasMotel_B02_VAR_05_NO_VACANCY.json",
  "NRA_0008_MidnightDiner_B01_VAR_08_CLOSED.json",
  "NRA_0009_MidnightDiner_B01_VAR_04_CLOSED.json",
  "NRA_0010_SideBRecords_B07_VAR_04_LAST_COPY.json",
  // Legendary batch (cropped stickers at top edge)
  "NRA_0024_SunsetMart_B04_VAR_01_ZERO_SUPPLY_GOLD.json",
  "NRA_0037_Lucky8GasMotel_B01_VAR_06_GOLD_SEAL_GOLD.json",
  "NRA_0072_MidnightDiner_B02_VAR_12_ARCHIVED_FOREVER_GOLD.json",
  "NRA_0085_SideBRecords_B03_VAR_02_GOLD_SEAL_GOLD.json",
  // Rare with legendary stickers
  "NRA_0003_SideBRecords_B04_VAR_01_STORE_CREDIT.json",
  "NRA_0018_NightOwlVideo_B08_VAR_03_CHECKED_OUT.json",
  "NRA_0029_SideBRecords_B04_VAR_08_LAST_COPY.json",
  "NRA_0051_TokenPawn_B03_VAR_07_VAULTED_GOLD.json",
  "NRA_0074_SunsetMart_B06_VAR_02_NO_REFUNDS.json",
  "NRA_0076_NightOwlVideo_B02_VAR_09_DO_NOT_OPEN.json",
  "NRA_0084_MidnightDiner_B03_VAR_03_LAST_ORDER.json",
  "NRA_0097_TokenPawn_B06_VAR_09_PAWN_HOLD.json"
];

async function loadAll() {
  const images = [];
  for (const metaFile of metadataFiles) {
    try {
      const resp = await fetch(`output/metadata_v2/${metaFile}`);
      const meta = await resp.json();
      const imgFile = meta.image;
      const attrs = {};
      meta.attributes.forEach(a => { attrs[a.trait_type] = a.value; });
      images.push({
        id: meta.name,
        filename: imgFile,
        series: attrs["Series"] || "",
        base: attrs["Base Template"] || "",
        mat: attrs["Material / Pattern"] || "",
        stamp: attrs["Stamp"] || "",
        note: attrs["Handwritten Note"] || "",
        prop1: attrs["Prop 1"] || "",
        prop2: attrs["Prop 2"] || "",
        damage: attrs["Paper Damage"] || "",
        overlay: attrs["Overlay"] || "",
        legend: attrs["Legendary Accent"] || "",
        rarity: attrs["Rarity"] || "Common"
      });
    } catch(e) { console.warn("Failed to load", metaFile, e); }
  }
  renderGrid(images);
}

function renderGrid(images) {
  const grid = document.getElementById('grid');
  const rarityCounts = {};
  const seriesSet = new Set();

  images.forEach(img => {
    rarityCounts[img.rarity] = (rarityCounts[img.rarity] || 0) + 1;
    seriesSet.add(img.series);

    const traits = [img.base, img.mat, img.stamp, img.note, img.prop1, img.prop2, img.damage, img.overlay, img.legend]
      .filter(Boolean)
      .map(t => `<span class="trait${t===img.stamp?' stamp':''}">${t}</span>`)
      .join('');

    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <img src="output/final_images_v2/${img.filename}" alt="${img.id}" loading="lazy" />
      <div class="card-body">
        <h3>${img.id} · ${img.series}</h3>
        <div class="filename">${img.filename}</div>
        <div class="traits">${traits}<span class="trait rarity-${img.rarity}">${img.rarity}</span></div>
      </div>
    `;
    grid.appendChild(card);
  });

  document.getElementById('summary').innerHTML = `
    <div class="summary-item"><div class="num">${images.length}</div><div class="label">Total Images</div></div>
    <div class="summary-item"><div class="num">${seriesSet.size}</div><div class="label">Series</div></div>
    <div class="summary-item"><div class="num">${Object.keys(rarityCounts).length}</div><div class="label">Rarity Tiers</div></div>
    <div class="summary-item"><div class="num">8</div><div class="label">Layer Types</div></div>
    <div class="summary-item"><div class="num">71+</div><div class="label">Trait Assets</div></div>
    <div class="summary-item"><div class="num">3.0</div><div class="label">Composer</div></div>
  `;

  const ul = document.getElementById('checklist-ul');
  ul.innerHTML = images.map(img => {
    const pngFile = img.filename.replace('.json','').endsWith('.png') ? img.filename : img.filename;
    return `<li class="pass">${img.id} — ${img.series} | ${img.stamp || '无印章'} | ${img.note || '无手写'} | ${img.rarity}</li>`;
  }).join('');
}

loadAll();
</script>

</body>
</html>
